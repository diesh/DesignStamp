<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tequila Tasting</title>
  <style>
    :root {
      --bg:        #0c0905;
      --surface:   #181109;
      --card:      #201608;
      --border:    #4a3a20; /* Darker but visible */
      --gold:      #ffbf33; /* High contrast gold */
      --gold-dim:  #9e7314;
      --cream:     #ffffff; /* Pure white for max legibility */
      --muted:     #b0a080; /* Brighter muted color */
      --smoke:     #302515;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--cream);
      font-size: 18px; /* Larger base font */
      -webkit-font-smoothing: antialiased;
    }

    #app { display: flex; flex-direction: column; min-height: 100dvh; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 2px solid var(--gold);
      padding: 12px 16px;
    }

    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .app-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--gold);
      text-align: center;
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: var(--smoke);
      border-radius: 12px;
      padding: 4px;
    }

    .nav-tab {
      border: none;
      background: none;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav-tab.active {
      background: var(--gold);
      color: #000;
    }

    main {
      flex: 1;
      padding: 20px 16px 120px; /* Space for fixed submit button */
    }

    .view { display: none; max-width: 680px; margin: 0 auto; }
    .view.active { display: block; }

    .section-label {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--gold);
      margin: 25px 0 12px;
      text-transform: uppercase;
      border-left: 4px solid var(--gold);
      padding-left: 10px;
    }

    /* Grid improvements for fat-fingers */
    .person-grid, .tequila-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .person-btn, .tequila-btn {
      min-height: 70px;
      border: 3px solid var(--border);
      background: var(--card);
      color: var(--cream);
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 10px;
    }

    .person-btn.selected, .tequila-btn.selected {
      border-color: var(--gold);
      background: rgba(255, 191, 51, 0.15);
      color: var(--gold);
    }

    .tequila-btn .label { font-size: 1.8rem; display: block; }
    .tequila-btn .name { font-size: 0.8rem; display: block; opacity: 0.8; }

    .category-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .category-title {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 15px;
    }

    .chips {
      display: flex;
      flex-direction: column; /* Stacked chips are easier to hit than a wrap grid */
      gap: 8px;
      margin-bottom: 15px;
    }

    .chip {
      width: 100%;
      text-align: left;
      padding: 15px;
      background: var(--smoke);
      border: 2px solid var(--border);
      color: var(--cream);
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 10px;
    }

    .chip.selected {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .score-btn {
      aspect-ratio: 1;
      font-size: 1.4rem;
      font-weight: 900;
      border: 2px solid var(--border);
      background: var(--smoke);
      color: var(--gold);
      border-radius: 10px;
    }

    .score-btn.selected {
      background: var(--gold);
      color: #000;
    }

    .notes-input {
      width: 100%;
      font-size: 1.1rem;
      padding: 15px;
      background: #000;
      border: 2px solid var(--border);
      color: #fff;
      border-radius: 10px;
    }

    /* Fixed floating submit button for drunk-proof access */
    .submit-btn {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      max-width: 648px;
      margin: 0 auto;
      background: #2ecc71; /* High contrast Green for "GO" */
      color: #000;
      padding: 22px;
      font-size: 1.4rem;
      font-weight: 900;
      border-radius: 16px;
      border: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 200;
    }

    .submit-btn:disabled {
      background: #333;
      color: #777;
      box-shadow: none;
    }

    .progress-row { background: var(--card); border: 2px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    
    .score-table-wrap { overflow-x: auto; border: 2px solid var(--border); border-radius: 12px; }
    .score-table { width: 100%; border-collapse: collapse; min-width: 400px; }
    .score-table th, .score-table td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
    .score-pill { font-size: 1.1rem; font-weight: 800; background: var(--gold); color: #000; padding: 4px 10px; border-radius: 6px; }

    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; color: var(--gold); font-size: 1.5rem; font-weight: 800; }
    #loading.hidden { display: none; }
    
    .divider { border: none; border-top: 2px solid var(--border); margin: 15px 0; }
  </style>
</head>
<body>

<div id="loading">Loading...</div>

<div id="app">
  <header>
    <div class="header-inner">
      <div class="app-title">Tasting Night!</div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-view="form">Add Notes</button>
        <button class="nav-tab" data-view="results">Results</button>
      </nav>
    </div>
  </header>

  <main>
    <div id="view-form" class="view active">
      
      <div class="progress-row">
        <div class="section-label" style="margin-top:0">Your progress</div>
        <div class="progress-dots" id="progressDots" style="display:flex; gap:8px;"></div>
      </div>

      <div class="form-block">
        <div class="section-label">1. Who are you?</div>
        <div class="person-grid" id="personGrid"></div>
      </div>

      <div class="form-block">
        <div class="section-label">2. Which tequila?</div>
        <div class="tequila-grid" id="tequilaGrid"></div>
      </div>

      <div id="categorySection" style="display:none">
        <div class="section-label">3. The Details</div>
        
        <div class="category-card">
          <div class="category-title">Appearance</div>
          <div class="chips" id="chips-appearance" data-mode="single" data-options="Crystal Clear,Pale Gold,Gold,Deep Gold,Amber"></div>
          <textarea class="notes-input" id="text-appearance" rows="2" placeholder="Appearance notes..."></textarea>
        </div>

        <div class="category-card">
          <div class="category-title">Legs</div>
          <div class="chips" id="chips-legs" data-mode="single" data-options="Thin & Fast,Medium,Thick & Slow"></div>
          <textarea class="notes-input" id="text-legs" rows="2" placeholder="Viscosity notes..."></textarea>
        </div>

        <div class="category-card">
          <div class="category-title">Nose (Aroma)</div>
          <div class="chips" id="chips-nose" data-mode="multi" data-options="Agave,Citrus,Floral,Vanilla,Caramel,Smoke,Pepper,Earthy,Tropical Fruit,Herbs,Butter,Chocolate"></div>
          <textarea class="notes-input" id="text-nose" rows="2" placeholder="Smell notes..."></textarea>
        </div>

        <div class="category-card">
          <div class="category-title">Palate (Taste)</div>
          <div class="chips" id="chips-palate" data-mode="multi" data-options="Smooth,Fiery,Sweet,Dry,Creamy,Complex,Agave-forward,Oaky,Spicy,Salty"></div>
          <textarea class="notes-input" id="text-palate" rows="2" placeholder="Taste notes..."></textarea>
        </div>

        <div class="category-card">
          <div class="category-title">Finish</div>
          <div class="chips" id="chips-finish" data-mode="single" data-options="Short,Medium,Long"></div>
          <textarea class="notes-input" id="text-finish" rows="2" placeholder="Finish notes..."></textarea>
        </div>

        <div class="category-card">
          <div class="category-title">Overall Score</div>
          <div class="score-row" id="scoreRow"></div>
          <textarea class="notes-input" id="text-overall" rows="3" placeholder="Final thoughts..."></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>SAVE TASTING NOTES</button>
      </div>

      <div id="pickPrompt" style="text-align:center; color:var(--muted); padding:40px 0;">
        Tap your name and a bottle to start.
      </div>
    </div>

    <div id="view-results" class="view">
        <div class="section-label">Leaderboard</div>
        <div class="score-table-wrap">
            <table class="score-table" id="scoreTable">
                <thead><tr id="scoreTableHead"></tr></thead>
                <tbody id="scoreTableBody"></tbody>
            </table>
        </div>
        <div id="resultsDetail" style="margin-top:20px;"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast" style="display:none; position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--gold); color:#000; padding:15px 30px; border-radius:30px; font-weight:800; z-index:1000;"></div>

<script>
// Logic remains identical to your original to prevent server errors
let CONFIG = { people: [], tequilas: [] };
let SUBMISSIONS = [];
let selectedPerson = null;
let selectedTequila = null;

async function init() {
  try {
    const [cfg, subs] = await Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/submissions').then(r => r.json())
    ]);
    CONFIG = cfg;
    SUBMISSIONS = subs;
    buildForm();
    buildResults();
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    document.getElementById('loading').textContent = 'Server Error - Check API';
  }
}

function buildForm() {
  const pGrid = document.getElementById('personGrid');
  pGrid.innerHTML = CONFIG.people.map(p => `<button class="person-btn" data-person="${p}">${p}</button>`).join('');
  pGrid.querySelectorAll('.person-btn').forEach(btn => btn.onclick = () => selectPerson(btn.dataset.person));

  const tGrid = document.getElementById('tequilaGrid');
  tGrid.innerHTML = CONFIG.tequilas.map(t => `
    <button class="tequila-btn" data-id="${t.id}">
      <span class="label">${t.label}</span>
      <span class="name">${t.name}</span>
    </button>
  `).join('');
  tGrid.querySelectorAll('.tequila-btn').forEach(btn => btn.onclick = () => selectTequila(+btn.dataset.id));

  document.querySelectorAll('.chips[data-options]').forEach(container => {
    const opts = container.dataset.options.split(',');
    const mode = container.dataset.mode;
    container.innerHTML = opts.map(o => `<button class="chip" data-value="${o}">${o}</button>`).join('');
    container.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = () => {
        if (mode === 'single') container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.toggle('selected');
        checkSubmitReady();
      };
    });
  });

  const sRow = document.getElementById('scoreRow');
  sRow.innerHTML = Array.from({length: 10}, (_, i) => i + 1).map(n => `<button class="score-btn" data-score="${n}">${n}</button>`).join('');
  sRow.querySelectorAll('.score-btn').forEach(btn => btn.onclick = () => {
    sRow.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    checkSubmitReady();
  });
  
  const dots = document.getElementById('progressDots');
  dots.innerHTML = CONFIG.tequilas.map(t => `<div class="prog-dot" data-tid="${t.id}" style="width:12px; height:12px; border-radius:50%; background:#444;"></div>`).join('');
}

function selectPerson(name) {
  selectedPerson = name;
  document.querySelectorAll('.person-btn').forEach(b => b.classList.toggle('selected', b.dataset.person === name));
  updateProgressDots();
  checkShowCategories();
}

function selectTequila(id) {
  selectedTequila = id;
  document.querySelectorAll('.tequila-btn').forEach(b => b.classList.toggle('selected', +b.dataset.id === id));
  checkShowCategories();
  loadExisting();
}

function updateProgressDots() {
  const done = new Set(SUBMISSIONS.filter(s => s.person === selectedPerson).map(s => s.tequilaId));
  document.querySelectorAll('.prog-dot').forEach(dot => {
    dot.style.background = done.has(+dot.dataset.tid) ? 'var(--gold)' : '#444';
  });
}

function checkShowCategories() {
  const show = selectedPerson && selectedTequila;
  document.getElementById('categorySection').style.display = show ? 'block' : 'none';
  document.getElementById('pickPrompt').style.display = show ? 'none' : 'block';
}

function checkSubmitReady() {
  const hasScore = !!document.querySelector('#scoreRow .score-btn.selected');
  document.getElementById('submitBtn').disabled = !hasScore;
}

function loadExisting() {
  const sub = SUBMISSIONS.find(s => s.person === selectedPerson && s.tequilaId === selectedTequila);
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.notes-input').forEach(t => t.value = '');
  
  if (sub) {
    const n = sub.notes;
    // Map back categories safely
    ['appearance', 'legs', 'nose', 'palate', 'finish'].forEach(cat => {
        const data = n[cat];
        if (!data) return;
        const container = document.getElementById(`chips-${cat}`);
        const vals = Array.isArray(data.selected) ? data.selected : [data.selected];
        container.querySelectorAll('.chip').forEach(c => {
            if (vals.includes(c.dataset.value)) c.classList.add('selected');
        });
        const txt = document.getElementById(`text-${cat}`);
        if (txt) txt.value = data.text || '';
    });

    if (n.overall?.score) {
        document.querySelector(`.score-btn[data-score="${n.overall.score}"]`)?.classList.add('selected');
    }
    document.getElementById('text-overall').value = n.overall?.text || '';
  }
  checkSubmitReady();
}

document.getElementById('submitBtn').onclick = async () => {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  const getFull = (id) => {
      const container = document.getElementById(`chips-${id}`);
      const selected = [...container.querySelectorAll('.chip.selected')].map(c => c.dataset.value);
      return {
          selected: container.dataset.mode === 'single' ? (selected[0] || null) : selected,
          text: document.getElementById(`text-${id}`)?.value || ""
      };
  };

  const scoreEl = document.querySelector('#scoreRow .score-btn.selected');
  
  const payload = {
    person: selectedPerson,
    tequilaId: selectedTequila,
    notes: { 
        appearance: getFull('appearance'),
        legs: getFull('legs'),
        nose: getFull('nose'),
        palate: getFull('palate'),
        finish: getFull('finish'),
        overall: { 
            score: +scoreEl.dataset.score, 
            text: document.getElementById('text-overall').value 
        }
    }
  };

  try {
    const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    if (res.ok) {
        showToast("SAVED!");
        SUBMISSIONS = await fetch('/api/submissions').then(r => r.json());
        updateProgressDots();
        buildResults();
    }
  } catch (err) {
      showToast("Error - Check Connection", true);
  } finally {
      btn.disabled = false;
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

document.querySelectorAll('.nav-tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        t.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${t.dataset.view}`).classList.add('active');
    };
});

function buildResults() {
    const head = document.getElementById('scoreTableHead');
    head.innerHTML = `<th>Who</th>` + CONFIG.tequilas.map(t => `<th>${t.label}</th>`).join('');
    const body = document.getElementById('scoreTableBody');
    body.innerHTML = CONFIG.people.map(p => {
        return `<tr><td>${p}</td>` + CONFIG.tequilas.map(t => {
            const s = SUBMISSIONS.find(sub => sub.person === p && sub.tequilaId === t.id);
            return `<td>${s ? `<span class="score-pill">${s.notes.overall.score}</span>` : '—'}</td>`;
        }).join('') + `</tr>`;
    }).join('');
}

init();
</script>
</body>
</html>
