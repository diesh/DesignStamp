<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tequila Tasting</title>
  <style>
    :root {
      --bg:        #0c0905;
      --surface:   #181109;
      --card:      #201608;
      --border:    #4a3a20; /* Darker/Thicker border */
      --gold:      #ffbf33; /* Brighter gold for contrast */
      --gold-dim:  #9e7314;
      --cream:     #ffffff; /* Pure white for max legibility */
      --muted:     #b0a080; /* Lighter muted color */
      --danger:    #ff4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--cream);
      font-size: 18px; /* Bigger base font */
      line-height: 1.4;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100dvh; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 3px solid var(--gold); /* Thicker indicator */
      padding: 10px 16px;
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gold);
      text-align: center;
      margin-bottom: 10px;
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .nav-tab {
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 800;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--smoke);
      color: var(--muted);
      cursor: pointer;
    }

    .nav-tab.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    main { padding: 20px 16px 80px; }

    .section-label {
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--gold);
      margin: 30px 0 15px;
      border-left: 4px solid var(--gold);
      padding-left: 10px;
    }

    /* ── Big Buttons ── */
    .person-grid, .tequila-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .person-btn, .tequila-btn {
      min-height: 80px; /* Big touch target */
      border: 3px solid var(--border);
      background: var(--card);
      color: var(--cream);
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 16px;
    }

    .person-btn.selected, .tequila-btn.selected {
      border-color: var(--gold);
      background: rgba(255, 191, 51, 0.2);
      box-shadow: 0 0 15px rgba(255, 191, 51, 0.3);
    }

    .tequila-btn .label { font-size: 2rem; display: block; color: var(--gold); }

    /* ── Vertical Option List (Replacement for Chips) ── */
    .option-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-btn {
      width: 100%;
      padding: 18px;
      text-align: left;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--cream);
      font-size: 1.1rem;
      font-weight: 600;
    }

    .option-btn.selected {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    /* ── Gigantic Scores ── */
    .score-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .score-btn {
      aspect-ratio: 1;
      font-size: 1.5rem;
      font-weight: 900;
      background: var(--smoke);
      border: 2px solid var(--border);
      color: var(--gold);
      border-radius: 12px;
    }

    .score-btn.selected {
      background: var(--gold);
      color: #000;
      transform: scale(1.1);
    }

    .notes-input {
      width: 100%;
      font-size: 1.2rem;
      padding: 15px;
      background: #000;
      border: 2px solid var(--border);
      color: #fff;
      border-radius: 12px;
      margin-top: 15px;
    }

    .submit-btn {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: #2ecc71; /* High contrast green for GO */
      color: #000;
      padding: 25px;
      font-size: 1.5rem;
      font-weight: 900;
      border-radius: 20px;
      border: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .submit-btn:disabled {
      background: #333;
      color: #777;
    }

    /* Results Accessibility */
    .score-pill {
      font-size: 1.2rem;
      padding: 8px 12px;
      background: var(--gold);
      color: #000;
      border-radius: 8px;
      font-weight: 900;
    }

    .score-table th, .score-table td {
        padding: 15px 10px;
        font-size: 1.1rem;
    }
  </style>
</head>
<body>
    </body>
</html>
