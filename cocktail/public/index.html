<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tastinggg — Blind Tasting for Groups</title>
  <style>
    :root {
      --bg: #0a0806; --surface: #151008; --card: #1e1509;
      --border: #332208; --gold: #e8a520;
      --cream: #f5ead0; --muted: #8a7050; --smoke: #2a1c08;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--cream); -webkit-font-smoothing: antialiased; }
    main { max-width: 480px; margin: 0 auto; padding: 60px 24px 80px; text-align: center; }
    .logo { font-size: 2.8rem; font-weight: 900; color: var(--gold); letter-spacing: -0.03em; margin-bottom: 8px; }
    .tagline { color: var(--muted); font-size: 1rem; margin-bottom: 48px; line-height: 1.5; }
    .cta-btn { display: block; width: 100%; background: var(--gold); color: #0a0806; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 900; padding: 18px; cursor: pointer; text-decoration: none; text-align: center; margin-bottom: 12px; transition: all 0.15s; }
    .cta-btn:hover { background: #f5b830; }
    .cta-secondary { display: block; width: 100%; background: var(--card); color: var(--muted); border: 1.5px solid var(--border); border-radius: 14px; font-size: 0.9rem; font-weight: 700; padding: 14px; cursor: pointer; text-decoration: none; text-align: center; margin-bottom: 32px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .join-label { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .code-input { width: 100%; background: var(--card); border: 2px solid var(--border); border-radius: 14px; color: var(--cream); font-size: 2rem; font-weight: 800; padding: 18px; text-align: center; text-transform: uppercase; letter-spacing: 0.2em; font-family: inherit; margin-bottom: 12px; }
    .code-input:focus { outline: none; border-color: var(--gold); }
    .join-btn { width: 100%; background: var(--smoke); color: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; font-size: 1rem; font-weight: 800; padding: 16px; cursor: pointer; transition: all 0.15s; }
    .join-btn:hover { border-color: var(--gold); color: var(--gold); }
    .spirits-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 40px; }
    .spirit-pill { background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--gold); color: #0a0806; font-weight: 800; font-size: 1rem; padding: 14px 28px; border-radius: 28px; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c04040; color: #fff; }
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<main>
  <div class="logo">Tastinggg</div>
  <div class="tagline">Blind tasting nights for groups —<br>scored, revealed, remembered.</div>
  <a href="host.html" class="cta-btn">Host a Tasting</a>
  <a href="host.html" class="cta-secondary">Already paid? Recover your session →</a>
  <div class="divider"></div>
  <div class="join-label">Join a tasting</div>
  <input class="code-input" id="codeInput" maxlength="6" placeholder="ABC123" autocomplete="off" spellcheck="false">
  <button class="join-btn" onclick="joinTasting()">Join →</button>
  <div class="spirits-list">
    <span class="spirit-pill">Tequila &amp; Mezcal</span>
    <span class="spirit-pill">Red Wine</span>
    <span class="spirit-pill">White Wine</span>
    <span class="spirit-pill">Port</span>
    <span class="spirit-pill">Whiskey / Scotch</span>
    <span class="spirit-pill">Beer</span>
  </div>
</main>
<script>
function joinTasting() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (code.length !== 6) { showToast('Enter a 6-character code', true); return; }
  window.location.href = 'app.html?code=' + code;
}
document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinTasting(); });
let toastTimer;
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
